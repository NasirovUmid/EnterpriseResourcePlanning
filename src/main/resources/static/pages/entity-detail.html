<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Object Detail</title>
    <link rel="stylesheet" href="/css/auth-pages.css">
</head>
<body>
<div class="page-shell">
    <div class="topbar">
        <div class="brand-block">
            <h1 id="detailTitle">Object detail</h1>
            <p id="detailSubtitle">Loading selected object...</p>
        </div>
        <div class="nav-links">
            <a class="nav-pill" href="/pages/admin-panel.html">Admin panel</a>
            <a class="nav-pill" href="/pages/profile.html">Profile</a>
            <a class="nav-pill" href="/index.html">Home</a>
        </div>
    </div>

    <section class="panel">
        <span class="eyebrow" id="detailType">Detail</span>
        <h2 class="section-title" id="detailName">Loading...</h2>
        <div id="detailStatus" class="status-box">Loading selected object...</div>
        <div id="detailContent" class="detail-list"></div>
        <form id="detailForm" class="detail-form" hidden>
            <div id="detailFormGrid" class="detail-form-grid"></div>
            <div class="detail-actions">
                <button id="saveDetailButton" class="btn btn-primary" type="submit">Update</button>
                <button id="deactivateDetailButton" class="btn btn-danger" type="button" hidden>Deactivate</button>
            </div>
        </form>
        <section id="relationsPanel" class="detail-form" hidden>
            <div>
                <span class="eyebrow">Linked</span>
                <h2 class="section-title" style="margin-top:8px;">Related objects</h2>
            </div>
            <div id="relationsContent" class="relation-grid"></div>
        </section>
    </section>
</div>

<script src="/js/auth-pages.js"></script>
<script>
    const {
        authorizedFetch,
        formatError,
        getApiBase,
        getSession,
        getStoredRoles,
        initializeRoleView,
        readJson,
        redirectToLogin,
        setStatus
    } = window.erpAuth;

    const CONFIG = {
        project: {
            label: "Project",
            endpoint: "/projects/",
            title: "name",
            fields: ["id", "name", "status"],
            updateRoles: ["ADMIN", "MOD_PROJECTS"],
            form: [
                {name: "name", label: "Name", type: "text"},
                {name: "status", label: "Status", type: "select", options: ["AWAITING", "ACTIVE", "COMPLETED", "CANCELLED", "FAILED"]}
            ],
            buildUpdate: function(payload, form) {
                return {
                    name: cleanValue(form.name.value),
                    status: cleanValue(form.status.value)
                };
            },
            buildDeactivate: function(payload) {
                return {
                    url: "/projects/" + encodeURIComponent(payload.id),
                    method: "PUT",
                    body: {name: payload.name, status: "CANCELLED"},
                    message: "Project cancelled."
                };
            },
            deactivateLabel: "Cancel project"
        },
        user: {
            label: "User",
            endpoint: "/users/",
            title: "fullName",
            fields: ["id", "fullName", "username", "phone", "status"],
            updateRoles: ["ADMIN", "MOD_USERS"],
            allowSelfUpdate: true,
            form: [
                {name: "fullName", label: "Full name", type: "text"},
                {name: "phone", label: "Phone", type: "text"}
            ],
            buildUpdate: function(payload, form) {
                return {
                    fullName: cleanValue(form.fullName.value),
                    phoneNumber: cleanValue(form.phone.value) || payload.phone
                };
            },
            buildDeactivate: function(payload) {
                return {
                    url: "/users/" + encodeURIComponent(payload.id),
                    method: "DELETE",
                    body: null,
                    message: "User deactivated."
                };
            },
            deactivateLabel: "Deactivate user"
        },
        organization: {
            label: "Organization",
            endpoint: "/organizations/",
            title: "name",
            fields: ["id", "name", "inn", "address"],
            updateRoles: ["ADMIN", "MOD_ORGANIZATIONS"],
            form: [
                {name: "name", label: "Name", type: "text"},
                {name: "address", label: "Address", type: "text"}
            ],
            buildUpdate: function(payload, form) {
                return {
                    name: cleanValue(form.name.value),
                    address: cleanValue(form.address.value) || payload.address
                };
            }
        },
        product: {
            label: "Product",
            endpoint: "/products/",
            title: "name",
            fields: ["id", "name", "price", "status"],
            updateRoles: ["ADMIN", "MOD_PRODUCTS"],
            form: [
                {name: "name", label: "Name", type: "text"},
                {name: "price", label: "Price", type: "number", step: "0.01"},
                {name: "status", label: "Status", type: "select", options: ["ACTIVE", "OUT_OF_STOCK", "ARCHIVED", "DRAFT"]}
            ],
            buildUpdate: function(payload, form) {
                return {
                    productId: payload.id,
                    name: cleanValue(form.name.value) || payload.name,
                    price: cleanNumber(form.price.value),
                    unit: null,
                    productStatus: cleanValue(form.status.value)
                };
            },
            buildDeactivate: function(payload) {
                return {
                    url: "/products/" + encodeURIComponent(payload.id),
                    method: "PUT",
                    body: {
                        productId: payload.id,
                        name: payload.name,
                        price: payload.price,
                        unit: null,
                        productStatus: "ARCHIVED"
                    },
                    message: "Product archived."
                };
            },
            deactivateLabel: "Archive product"
        },
        contract: {
            label: "Contract",
            endpoint: "/contracts/",
            title: "contractNumber",
            fields: ["id", "contractNumber", "price", "startDate", "endDate"],
            updateRoles: ["ADMIN", "MOD_CONTRACTS"],
            form: [
                {name: "price", label: "Amount", type: "number", step: "0.01"},
                {name: "startDate", label: "Start date", type: "datetime-local"},
                {name: "endDate", label: "End date", type: "datetime-local"}
            ],
            buildUpdate: function(payload, form) {
                return {
                    amount: cleanNumber(form.price.value),
                    startDate: cleanDateTime(form.startDate.value),
                    endDate: cleanDateTime(form.endDate.value)
                };
            },
            buildDeactivate: function(payload) {
                return {
                    url: "/contracts/" + encodeURIComponent(payload.id),
                    method: "DELETE",
                    body: null,
                    message: "Contract deleted."
                };
            },
            deactivateLabel: "Delete contract"
        }
    };

    let currentConfig = null;
    let currentPayload = null;
    let currentType = "";

    function escapeHtml(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch) {
            return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];
        });
    }

    function cleanValue(value) {
        const text = String(value == null ? "" : value).trim();
        return text || null;
    }

    function cleanNumber(value) {
        const text = cleanValue(value);
        return text == null ? null : Number(text);
    }

    function cleanDateTime(value) {
        const text = cleanValue(value);
        return text == null ? null : new Date(text).toISOString();
    }

    function toDateTimeLocal(value) {
        if (!value) {
            return "";
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
            return "";
        }

        const offset = date.getTimezoneOffset() * 60000;
        return new Date(date.getTime() - offset).toISOString().slice(0, 16);
    }

    function hasAnyRole(requiredRoles) {
        const roles = getStoredRoles();
        return requiredRoles.some(function(role) {
            return roles.includes(role);
        });
    }

    function canUpdate(type, payload, config) {
        const session = getSession();
        const roleAllowed = hasAnyRole(config.updateRoles || []);
        const selfAllowed = config.allowSelfUpdate && session.userId && payload.id && session.userId === payload.id;
        return roleAllowed || selfAllowed;
    }

    function canDeactivate(payload, config) {
        const session = getSession();
        return hasAnyRole(["ADMIN"]) && config.buildDeactivate && session.userId !== payload.id;
    }

    function appendQuery(url, params) {
        Object.keys(params || {}).forEach(function(key) {
            const value = params[key];
            if (value !== undefined && value !== null && value !== "") {
                url += "&" + encodeURIComponent(key) + "=" + encodeURIComponent(value);
            }
        });
        return url;
    }

    function listFromPage(payload) {
        return Array.isArray(payload) ? payload : (payload && Array.isArray(payload.content) ? payload.content : []);
    }

    function displayName(item, titleField) {
        return item[titleField] || item.fullName || item.name || item.contractNumber || item.username || item.id || "Item";
    }

    function buildSearchUrl(type, query) {
        if (type === "user") {
            let url = "/users?page=0&size=10&sort=fullName,asc";
            if (query.length >= 5) url = appendQuery(url, {fullName: query});
            return url;
        }

        if (type === "organization") {
            let url = "/organizations?page=0&size=10&sort=name,asc";
            if (query.length >= 5) url = appendQuery(url, {name: query});
            return url;
        }

        if (type === "project") {
            let url = "/projects?page=0&size=10&sort=name,asc";
            if (query.length >= 1) url = appendQuery(url, {name: query});
            return url;
        }

        if (type === "contract") {
            let url = "/contracts?page=0&size=10&sort=startDate,desc";
            if (query.length >= 27) url = appendQuery(url, {contractNumber: query});
            return url;
        }

        return "";
    }

    const RELATIONS = {
        project: [
            {key: "organizations", label: "Organizations", target: "organization", title: "name", roles: ["ADMIN", "MOD_PROJECTS"], listUrl: function(p) { return "/projects/organizations/" + encodeURIComponent(p.id); }, linkUrl: "/projects/organizations", body: function(p, item) { return {uuid: p.id, uuid1: item.id}; }},
            {key: "users", label: "Users", target: "user", title: "fullName", roles: ["ADMIN", "MOD_PROJECTS"], listUrl: null, linkUrl: "/projects/user", body: function(p, item) { return {uuid: item.id, uuid1: p.id}; }},
            {key: "contracts", label: "Contracts", target: "contract", title: "contractNumber", roles: ["ADMIN", "MOD_CONTRACTS"], listUrl: function(p) { return "/contracts/projects/" + encodeURIComponent(p.id); }, linkUrl: "/contracts/projects", body: function(p, item) { return {uuid: item.id, uuid1: p.id}; }}
        ],
        organization: [
            {key: "users", label: "Users", target: "user", title: "fullName", roles: ["ADMIN", "MOD_ORGANIZATIONS"], listUrl: function(p) { return "/organizations/users/" + encodeURIComponent(p.id); }, linkUrl: "/organizations/users", body: function(p, item) { return {uuid: item.id, uuid1: p.id}; }},
            {key: "projects", label: "Projects", target: "project", title: "name", roles: ["ADMIN", "MOD_PROJECTS"], listUrl: function(p) { return "/projects/organizations-projects/" + encodeURIComponent(p.id); }, linkUrl: "/projects/organizations", body: function(p, item) { return {uuid: item.id, uuid1: p.id}; }},
            {key: "contracts", label: "Contracts", target: "contract", title: "contractNumber", roles: ["ADMIN", "MOD_CONTRACTS"], listUrl: function(p) { return "/contracts/organizations/" + encodeURIComponent(p.id); }, linkUrl: "/contracts/organizations", body: function(p, item) { return {uuid: p.id, uuid1: item.id}; }}
        ],
        user: [
            {key: "organizations", label: "Organizations", target: "organization", title: "name", roles: ["ADMIN", "MOD_ORGANIZATIONS"], listUrl: function(p) { return "/organizations/user-organization/" + encodeURIComponent(p.id); }, linkUrl: "/organizations/users", body: function(p, item) { return {uuid: p.id, uuid1: item.id}; }},
            {key: "projects", label: "Projects", target: "project", title: "name", roles: ["ADMIN", "MOD_PROJECTS"], listUrl: function(p) { return "/projects/users-projects/" + encodeURIComponent(p.id); }, linkUrl: "/projects/user", body: function(p, item) { return {uuid: p.id, uuid1: item.id}; }}
        ],
        contract: [
            {key: "projects", label: "Projects", target: "project", title: "name", roles: ["ADMIN", "MOD_CONTRACTS"], listUrl: function(p) { return "/contracts/contracts/" + encodeURIComponent(p.id); }, linkUrl: "/contracts/projects", body: function(p, item) { return {uuid: p.id, uuid1: item.id}; }},
            {key: "organizations", label: "Organizations", target: "organization", title: "name", roles: ["ADMIN", "MOD_CONTRACTS"], listUrl: null, linkUrl: "/contracts/organizations", body: function(p, item) { return {uuid: item.id, uuid1: p.id}; }}
        ]
    };

    function renderDetail(config, payload) {
        const title = payload[config.title] || payload.id || config.label;
        document.getElementById("detailTitle").textContent = config.label + " detail";
        document.getElementById("detailSubtitle").textContent = payload.id || "";
        document.getElementById("detailType").textContent = config.label;
        document.getElementById("detailName").textContent = title;
        document.title = config.label + " - ERP";

        document.getElementById("detailContent").innerHTML = config.fields.map(function(field) {
            const value = payload[field] == null ? "-" : payload[field];
            return '<div class="detail-row"><strong>' + escapeHtml(field) + '</strong><span>' + escapeHtml(value) + '</span></div>';
        }).join("");
    }

    function renderInput(field, payload) {
        const value = payload[field.name] == null ? "" : payload[field.name];
        if (field.type === "select") {
            const options = ['<option value="">Keep current</option>'].concat(field.options.map(function(option) {
                const selected = option === value ? " selected" : "";
                return '<option value="' + escapeHtml(option) + '"' + selected + '>' + escapeHtml(option) + '</option>';
            }));
            return '<label>' + escapeHtml(field.label) + '<select name="' + escapeHtml(field.name) + '">' + options.join("") + '</select></label>';
        }

        const step = field.step ? ' step="' + escapeHtml(field.step) + '"' : "";
        const inputValue = field.type === "datetime-local" ? toDateTimeLocal(value) : value;
        return '<label>' + escapeHtml(field.label) + '<input name="' + escapeHtml(field.name) + '" type="' + escapeHtml(field.type) + '"' + step + ' value="' + escapeHtml(inputValue) + '"></label>';
    }

    function renderActions(type, payload, config) {
        const form = document.getElementById("detailForm");
        const grid = document.getElementById("detailFormGrid");
        const deactivateButton = document.getElementById("deactivateDetailButton");

        if (!canUpdate(type, payload, config)) {
            form.hidden = true;
            return;
        }

        grid.innerHTML = config.form.map(function(field) {
            return renderInput(field, payload);
        }).join("");

        deactivateButton.hidden = !canDeactivate(payload, config);
        deactivateButton.textContent = config.deactivateLabel || "Deactivate";
        form.hidden = false;
    }

    function renderRelationItems(containerId, items, relation) {
        const container = document.getElementById(containerId);
        if (!items || items.length === 0) {
            container.innerHTML = '<div class="empty-state">No linked items loaded.</div>';
            return;
        }

        container.innerHTML = items.map(function(item) {
            const href = '/pages/entity-detail.html?type=' + encodeURIComponent(relation.target) + '&id=' + encodeURIComponent(item.id);
            return '<a class="relation-item" href="' + href + '">' +
                '<strong>' + escapeHtml(displayName(item, relation.title)) + '</strong>' +
                '<span>' + escapeHtml(item.id || '') + '</span>' +
                '</a>';
        }).join("");
    }

    function relationCanEdit(relation) {
        return hasAnyRole(relation.roles || []);
    }

    async function renderRelations(type, payload) {
        const panel = document.getElementById("relationsPanel");
        const content = document.getElementById("relationsContent");
        const relations = RELATIONS[type] || [];

        if (relations.length === 0) {
            panel.hidden = true;
            return;
        }

        panel.hidden = false;
        content.innerHTML = relations.map(function(relation) {
            const canEdit = relationCanEdit(relation);
            return '<article class="relation-card" data-relation="' + escapeHtml(relation.key) + '">' +
                '<div class="relation-head"><h3>' + escapeHtml(relation.label) + '</h3>' +
                (canEdit ? '<button class="btn btn-secondary relation-toggle" type="button" data-relation="' + escapeHtml(relation.key) + '">Add</button>' : '') +
                '</div>' +
                '<div id="rel-list-' + escapeHtml(relation.key) + '" class="relation-list"><div class="empty-state">Loading...</div></div>' +
                (canEdit ? '<div id="rel-add-' + escapeHtml(relation.key) + '" class="relation-add" hidden>' +
                    '<input id="rel-query-' + escapeHtml(relation.key) + '" type="text" placeholder="Type to find a matching item">' +
                    '<button class="btn btn-secondary relation-search" type="button" data-relation="' + escapeHtml(relation.key) + '">Find matching</button>' +
                    '<select id="rel-select-' + escapeHtml(relation.key) + '"><option value="">No items loaded</option></select>' +
                    '<button class="btn btn-primary relation-save" type="button" data-relation="' + escapeHtml(relation.key) + '">Add selected</button>' +
                '</div>' : '') +
            '</article>';
        }).join("");

        await Promise.all(relations.map(async function(relation) {
            if (!relation.listUrl) {
                renderRelationItems("rel-list-" + relation.key, [], relation);
                return;
            }

            try {
                const response = await authorizedFetch(getApiBase() + relation.listUrl(payload), {method: "GET"});
                const data = await readJson(response);
                if (!response.ok) throw data;
                renderRelationItems("rel-list-" + relation.key, listFromPage(data), relation);
            } catch (error) {
                document.getElementById("rel-list-" + relation.key).innerHTML = '<div class="empty-state">' + escapeHtml(formatError(error)) + '</div>';
            }
        }));
    }

    function findRelation(key) {
        return (RELATIONS[currentType] || []).find(function(relation) {
            return relation.key === key;
        });
    }

    async function searchRelation(relation) {
        const query = document.getElementById("rel-query-" + relation.key).value.trim();
        const select = document.getElementById("rel-select-" + relation.key);
        const response = await authorizedFetch(getApiBase() + buildSearchUrl(relation.target, query), {method: "GET"});
        const data = await readJson(response);

        if (!response.ok) {
            throw data;
        }

        const items = listFromPage(data);
        select.innerHTML = items.length ? items.map(function(item) {
            return '<option value="' + escapeHtml(item.id) + '">' + escapeHtml(displayName(item, relation.title)) + ' - ' + escapeHtml(item.id) + '</option>';
        }).join("") : '<option value="">No matching items</option>';
        select.dataset.items = JSON.stringify(items);
    }

    async function sendJson(url, method, body) {
        const options = {method: method};
        if (body) {
            options.headers = {"Content-Type": "application/json"};
            options.body = JSON.stringify(body);
        }

        const response = await authorizedFetch(getApiBase() + url, options);
        const payload = await readJson(response);
        if (!response.ok) {
            throw payload;
        }
        return payload;
    }

    async function loadDetail() {
        const params = new URLSearchParams(window.location.search);
        const type = (params.get("type") || "").toLowerCase();
        const id = params.get("id") || "";
        const config = CONFIG[type];

        if (!config || !id) {
            setStatus("detailStatus", "Unknown object type or missing object id.", "error");
            return;
        }

        try {
            await initializeRoleView();
            const response = await authorizedFetch(getApiBase() + config.endpoint + encodeURIComponent(id), {
                method: "GET"
            });
            const payload = await readJson(response);

            if (!response.ok) {
                throw payload;
            }

            currentConfig = config;
            currentPayload = payload;
            currentType = type;
            renderDetail(config, payload);
            renderActions(type, payload, config);
            await renderRelations(type, payload);
            setStatus("detailStatus", config.label + " loaded successfully.", "success");
        } catch (error) {
            setStatus("detailStatus", formatError(error), "error");
        }
    }

    document.getElementById("detailForm").addEventListener("submit", async function(event) {
        event.preventDefault();

        if (!currentConfig || !currentPayload) {
            return;
        }

        try {
            setStatus("detailStatus", "Updating object...", "");
            const body = currentConfig.buildUpdate(currentPayload, event.target.elements);
            await sendJson(currentConfig.endpoint + encodeURIComponent(currentPayload.id), "PUT", body);
            setStatus("detailStatus", currentConfig.label + " updated successfully.", "success");
            await loadDetail();
        } catch (error) {
            setStatus("detailStatus", formatError(error), "error");
        }
    });

    document.getElementById("deactivateDetailButton").addEventListener("click", async function() {
        if (!currentConfig || !currentPayload || !currentConfig.buildDeactivate) {
            return;
        }

        try {
            setStatus("detailStatus", "Applying admin action...", "");
            const action = currentConfig.buildDeactivate(currentPayload);
            await sendJson(action.url, action.method, action.body);
            setStatus("detailStatus", action.message, "success");
            await loadDetail();
        } catch (error) {
            setStatus("detailStatus", formatError(error), "error");
        }
    });

    document.getElementById("relationsContent").addEventListener("click", async function(event) {
        const toggle = event.target.closest(".relation-toggle");
        const search = event.target.closest(".relation-search");
        const save = event.target.closest(".relation-save");
        const button = toggle || search || save;

        if (!button) {
            return;
        }

        const relation = findRelation(button.dataset.relation);
        if (!relation || !currentPayload) {
            return;
        }

        if (toggle) {
            const addBox = document.getElementById("rel-add-" + relation.key);
            addBox.hidden = !addBox.hidden;
            return;
        }

        try {
            if (search) {
                setStatus("detailStatus", "Searching matching items...", "");
                await searchRelation(relation);
                setStatus("detailStatus", "Matching list loaded.", "success");
                return;
            }

            const select = document.getElementById("rel-select-" + relation.key);
            const items = JSON.parse(select.dataset.items || "[]");
            const selected = items.find(function(item) {
                return item.id === select.value;
            });

            if (!selected) {
                setStatus("detailStatus", "Choose an item from the filtered list first.", "error");
                return;
            }

            setStatus("detailStatus", "Adding related item...", "");
            await sendJson(relation.linkUrl, "POST", relation.body(currentPayload, selected));
            setStatus("detailStatus", "Related item added.", "success");
            await loadDetail();
        } catch (error) {
            setStatus("detailStatus", formatError(error), "error");
        }
    });

    if (!getSession().accessToken && !getSession().refreshToken) {
        redirectToLogin();
    } else {
        loadDetail();
    }
</script>
</body>
</html>
