<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User — ERP</title>
    <link rel="stylesheet" href="/css/auth-pages.css">
</head>
<body>
<div class="page-shell">
    <div class="topbar">
        <div class="brand-block">
            <h1>Create User</h1>
            <p style="color:var(--muted);margin:6px 0 0;">Add a new user account to the system.</p>
        </div>
        <div class="nav-links">
            <a class="nav-pill" href="/pages/admin-panel.html#users">← Back to Users</a>
            <a class="nav-pill" href="/index.html">Home</a>
        </div>
    </div>
    <div style="max-width:520px;margin:0 auto;">
        <section class="panel">
            <span class="eyebrow">New User</span>
            <h2 class="section-title" style="margin-top:10px;">Account details</h2>
            <form id="userForm" class="form-grid" style="margin-top:18px;">
                <div class="input-row"><label for="userFullname">Full name</label><input id="userFullname" type="text" placeholder="John Doe" required minlength="5" maxlength="25"></div>
                <div class="input-row"><label for="userEmail">Email (username)</label><input id="userEmail" type="email" placeholder="john@example.com" required></div>
                <div class="input-row"><label for="userPassword">Password</label><input id="userPassword" type="password" placeholder="Min 8 characters" required minlength="8" maxlength="30"></div>
                <div class="input-row"><label for="userPhone">Phone number</label><input id="userPhone" type="text" placeholder="+998901234567" required pattern="^(\+)?998\d{9}$"></div>
                <div class="input-row"><label for="userAvatar">Avatar image</label><input id="userAvatar" type="file" required accept="image/*"></div>
                <div class="button-row">
                    <button class="btn btn-primary" type="submit">Create user</button>
                    <a class="btn btn-secondary" href="/pages/admin-panel.html#users">Cancel</a>
                </div>
            </form>
            <div id="formStatus" class="status-box" style="margin-top:14px;"></div>
        </section>
    </div>
</div>
<script src="/js/auth-pages.js"></script>
<script>
    const { authorizedFetch, formatError, getApiBase, getSession, guardPage, readJson, redirectToLogin, setStatus } = window.erpAuth;
    if (!getSession().accessToken && !getSession().refreshToken) { redirectToLogin(); }
    else {
        guardPage(['ADMIN','MOD_USERS']).catch(console.error);
        document.getElementById('userForm').addEventListener('submit', async function(e) {
            e.preventDefault(); setStatus('formStatus','Creating user…','');
            try {
                const fd = new FormData();
                const dto = { fullname: document.getElementById('userFullname').value.trim(), username: document.getElementById('userEmail').value.trim(),
                    password: document.getElementById('userPassword').value, phoneNumber: document.getElementById('userPhone').value.trim() };
                fd.append('data', new Blob([JSON.stringify(dto)], {type:'application/json'}));
                const fi = document.getElementById('userAvatar'); if(fi.files.length>0) fd.append('avatar',fi.files[0]);
                const res = await authorizedFetch(getApiBase()+'/users',{method:'POST',body:fd});
                const d = await readJson(res); if(!res.ok) throw d;
                setStatus('formStatus','✓ User "'+d.fullname+'" created!','success');
                e.target.reset();
            } catch(err){ setStatus('formStatus',formatError(err),'error'); }
        });
    }
</script>
</body>
</html>
