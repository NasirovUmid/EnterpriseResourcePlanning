<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Contract — ERP</title>
    <link rel="stylesheet" href="/css/auth-pages.css">
</head>
<body>
<div class="page-shell">
    <div class="topbar">
        <div class="brand-block">
            <h1>Create Contract</h1>
            <p style="color:var(--muted);margin:6px 0 0;">Register a new contract in the system.</p>
        </div>
        <div class="nav-links">
            <a class="nav-pill" href="/pages/admin-panel.html#contracts">← Back to Contracts</a>
            <a class="nav-pill" href="/index.html">Home</a>
        </div>
    </div>
    <div style="max-width:520px;margin:0 auto;">
        <section class="panel">
            <span class="eyebrow">New Contract</span>
            <h2 class="section-title" style="margin-top:10px;">Contract details</h2>
            <form id="contractForm" class="form-grid" style="margin-top:18px;">
                <div class="input-row"><label for="contractNumber">Contract number</label><input id="contractNumber" type="text" placeholder="CTR-2024-001" required></div>
                <div class="input-row"><label for="contractAmount">Amount</label><input id="contractAmount" type="number" step="0.01" placeholder="1000.00" required min="0"></div>
                <div class="input-row"><label for="contractStart">Start date</label><input id="contractStart" type="datetime-local" required></div>
                <div class="input-row"><label for="contractEnd">End date</label><input id="contractEnd" type="datetime-local" required></div>
                <div class="button-row">
                    <button class="btn btn-primary" type="submit">Create contract</button>
                    <a class="btn btn-secondary" href="/pages/admin-panel.html#contracts">Cancel</a>
                </div>
            </form>
            <div id="formStatus" class="status-box" style="margin-top:14px;"></div>
        </section>
    </div>
</div>
<script src="/js/auth-pages.js"></script>
<script>
    const { authorizedFetch, formatError, getApiBase, getSession, guardPage, readJson, redirectToLogin, setStatus } = window.erpAuth;
    if (!getSession().accessToken && !getSession().refreshToken) { redirectToLogin(); }
    else {
        guardPage(['ADMIN','MOD_CONTRACTS']).catch(console.error);
        document.getElementById('contractForm').addEventListener('submit', async function(e) {
            e.preventDefault(); setStatus('formStatus','Creating…','');
            try {
                const res = await authorizedFetch(getApiBase()+'/contracts',{method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({contractNumber:document.getElementById('contractNumber').value.trim(),
                        amount:parseFloat(document.getElementById('contractAmount').value),
                        startDate:new Date(document.getElementById('contractStart').value).toISOString(),
                        endDate:new Date(document.getElementById('contractEnd').value).toISOString()})});
                const d = await readJson(res); if(!res.ok) throw d;
                setStatus('formStatus','✓ Contract "'+d.contractNumber+'" created!','success');
                e.target.reset();
            } catch(err){ setStatus('formStatus',formatError(err),'error'); }
        });
    }
</script>
</body>
</html>
